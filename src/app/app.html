<main class="min-h-screen bg-slate-900 text-white p-8">
  <h2 class="text-5xl font-bold">{{ title() }}</h2>
  <p class="text-lg mt-2 mb-8 text-slate-400">
    Descubra se vale a pena jogar um game com base em dados reais.
  </p>

  <!-- Campo de busca -->
  <div class="flex gap-4 mb-8">
    <input
      type="text"
      placeholder="Buscar um jogo..."
      class="bg-slate-800 text-white px-4 py-3 rounded-lg w-80 outline-none focus:ring-2 focus:ring-indigo-500"
      #searchInput
    />
    <button
      (click)="handleSearch(searchInput.value)"
      class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg font-bold transition">
      Buscar
    </button>
  </div>

  <!-- Cards fixos -->
  <h3 class="text-2xl font-bold mb-4">Jogos Populares</h3>
  <section class="flex flex-wrap gap-4 mb-8">
    <card title="GTA V" image="https://media.rawg.io/media/games/20a/20aa03a10cda45239fe22d035c0ebe64.jpg" [stars]="3" (gameClick)="handleCardClick($event)"></card>
    <card title="The Witcher 3" image="https://upload.wikimedia.org/wikipedia/en/thumb/0/0c/Witcher_3_cover_art.jpg/250px-Witcher_3_cover_art.jpg" [stars]="3" (gameClick)="handleCardClick($event)"></card>
    <card title="Cyberpunk 2077" image="https://media.rawg.io/media/games/26d/26d4437715bee60138dab4a7c8c59c92.jpg" [stars]="2" (gameClick)="handleCardClick($event)"></card>
    <card title="FIFA 23" image="https://cdn2.unrealengine.com/ea-sports-fifa-23-is-coming-to-the-epic-games-store-1920x1080-398e19351a82.jpg" [stars]="2" (gameClick)="handleCardClick($event)"></card>
    <card title="Battlefield 2042" image="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1517290/header.jpg?t=1761752400" [stars]="1" (gameClick)="handleCardClick($event)"></card>
    <card title="eFootball 2024" image="https://sm.ign.com/ign_pt/cover/e/efootball-/efootball-2024_1fbt.jpg" [stars]="1" (gameClick)="handleCardClick($event)"></card>
  </section>

  <!-- Resultado -->
  @if (gameResponse()) {
    <section class="p-6 bg-slate-800 rounded-lg">
      <p class="text-xl">{{ gameResponse() }}</p>
    </section>
  }
</main>
