<main class="min-h-screen bg-slate-900 text-white p-8">
  <h2 class="text-5xl font-bold">{{ title() }}</h2>
  <p class="text-lg mt-2 mb-8 text-slate-400">
    Descubra se vale a pena jogar um game com base em dados reais.
  </p>

  <!-- Campo de busca -->
  <div class="flex gap-4 mb-8">
    <input
      type="text"
      placeholder="Buscar um jogo..."
      class="bg-slate-800 text-white px-4 py-3 rounded-lg w-80 outline-none focus:ring-2 focus:ring-indigo-500"
      #searchInput
    />
    <button
      (click)="handleSearch(searchInput.value)"
      class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-lg font-bold transition">
      Buscar
    </button>
  </div>

  <!-- Cards fixos -->
  <h3 class="text-2xl font-bold mb-4">Jogos Populares</h3>
  <section class="flex flex-wrap gap-4 mb-8">
    <card title="GTA V" image="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRRQvYTe3qFCjkObI1klING99Cyok-ym2BGhA&s" [stars]="3" (gameClick)="handleCardClick($event)"></card>
    <card title="The Witcher 3" image="https://upload.wikimedia.org/wikipedia/en/thumb/0/0c/Witcher_3_cover_art.jpg/250px-Witcher_3_cover_art.jpg" [stars]="3" (gameClick)="handleCardClick($event)"></card>
    <card title="Cyberpunk 2077" image="https://upload.wikimedia.org/wikipedia/pt/f/f7/Cyberpunk_2077_capa.png" [stars]="2" (gameClick)="handleCardClick($event)"></card>
    <card title="FIFA 23" image="https://i0.wp.com/dropsdejogos.uai.com.br/wp-content/uploads/sites/10/2022/09/divulgacao-fifa-23-reproducao-scaled.jpg?resize=950%2C534&ssl=1" [stars]="2" (gameClick)="handleCardClick($event)"></card>
    <card title="Battlefield 2042" image="https://m.media-amazon.com/images/I/817oumYSwcL.jpg" [stars]="1" (gameClick)="handleCardClick($event)"></card>
    <card title="eFootball 2024" image="https://gaming-cdn.com/images/products/14996/orig/efootball-2024-pc-game-steam-cover.jpg?v=1698070162" [stars]="1" (gameClick)="handleCardClick($event)"></card>
  </section>

  <!-- Resultado -->
  @if (gameResponse()) {
    <section class="p-6 bg-slate-800 rounded-lg">
      <p class="text-xl">{{ gameResponse() }}</p>
    </section>
  }
</main>
